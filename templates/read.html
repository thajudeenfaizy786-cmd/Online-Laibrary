{% extends 'base.html' %}


<!DOCTYPE html>
<html>
<head>
    <title>{{ book.title }}</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container{
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2{
            margin-bottom: 20px;
        }

        .btn{
            padding: 10px 18px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            margin-right: 10px;
            display: inline-block;
        }

        .read-btn{
            background-color: #007bff;
        }

        .download-btn{
            background-color: #28a745;
        }

        .btn:hover{
            opacity: 0.9;
        }
    </style>
</head>
<body>

{% block content %}

<div class="container mt-5">
    <div class="d-flex justify-content-center">
        <div class="card p-4 shadow" style="width: 400px; border-radius: 12px;">

            <h3 class="mb-2">{{ book.title }}</h3>
            <p class="text-muted">{{ book.author }}</p>
            {%if book.pdf%}
                <div class="mt-3">
                    <a href="{{ book.pdf.url }}" target="_blank" class="btn btn-primary me-2">📖 Read Online</a>
                    <a href="{{ book.pdf.url }}" download class="btn btn-success">⬇ Download</a>
                </div>
            {%else%}
                <p class="text-danger">PDF not available for this book.</p>
            {%endif%}    
        </div>
    </div>
</div>

{%endblock%}
